name: Valuation Lab Automation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run screener company automation
        run: python src/run_automation.py

      - name: Upload valuation summary outputs
        uses: actions/upload-artifact@v4
        with:
          name: valuation-lab-outputs
          path: outputs/valuation_summary/
